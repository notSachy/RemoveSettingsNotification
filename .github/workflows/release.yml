name: Package and Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Package addon
        run: |
          ADDON_NAME="RemoveSettingsNotification"
          mkdir -p "$ADDON_NAME"
          cp RemoveSettingsNotification.lua "$ADDON_NAME/"
          cp RemoveSettingsNotification.toc "$ADDON_NAME/"
          cp LICENSE "$ADDON_NAME/"
          zip -r "${ADDON_NAME}-${GITHUB_REF_NAME}.zip" "$ADDON_NAME"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: RemoveSettingsNotification-${{ github.ref_name }}.zip
          generate_release_notes: true
